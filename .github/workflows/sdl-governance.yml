name: SDL Governance

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

permissions:
  contents: read

jobs:
  sdl-governance:
    runs-on: mac-mini
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Python dependencies
        # cryptography is required to verify ed25519 routing-attestation signatures;
        # without it the validator silently skips ed25519 and every attestation fails.
        run: python3 -m pip install --user "pyyaml>=6.0" "cryptography>=42.0.0"

      - name: Validate SDL manifest and policy schemas
        run: |
          python3 .stibdedlom/bin/validate-schemas.py --repo-root "$PWD"

      - name: Validate routing attestations
        env:
          SDL_ROUTING_ATTESTATION_KEY: ${{ secrets.SDL_ROUTING_ATTESTATION_KEY }}
        run: |
          python3 .stibdedlom/bin/validate-attestations.py \
            --repo-root "$PWD" \
            --trust-anchor "${SDL_ROUTING_ATTESTATION_KEY:-}"

      - name: Validate trust anchor
        run: |
          python3 .stibdedlom/bin/validate-trust-anchor.py \
            --repo-root "$PWD"

      - name: Re-run pre-commit checks on HEAD
        # Server-side mirror of the local pre-commit hook for branches/PRs. Skipped on
        # main: validate-commit treats main as a protected branch and rejects it.
        # Main's governance is covered by the schema / attestation / trust-anchor steps.
        if: github.ref_name != 'main'
        run: |
          COMMIT_MSG=$(git log -1 --format=%B)
          python3 .stibdedlom/bin/validate-commit.py \
            --repo-root "$PWD" \
            --commit-msg-text "$COMMIT_MSG"

      - name: Re-run pre-push checks
        # Server-side mirror of the local pre-push hook for branches/PRs. Skipped on
        # main: remote-ref resolves to refs/heads/main, which validate-push rejects as
        # a protected branch. Main's governance is covered by the steps above.
        if: github.ref_name != 'main'
        run: |
          python3 .stibdedlom/bin/validate-push.py \
            --repo-root "$PWD" \
            --base "origin/main" \
            --head "HEAD" \
            --remote-ref "refs/heads/${{ github.ref_name }}"
