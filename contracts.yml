# Canonical contract version → repository tag/commit mapping.
#
# The `repositories` block records the exact tag (preferred) or commit SHA for
# each repo that participates in the contract. External consumers can resolve
# compatible dependency sets from this file.

contracts:
  - version: "0.3.0"
    name: "COG ↔ SDL capability bridge contract — Gate 2 confirmation and event alignment"
    date: "2026-06-28"
    description: >
      Adds Intent.confirmed for high/medium-risk confirmation replay, aligns
      event payloads with specs/behavior/event-bus.md (InputSentEvent.text,
      NoteSavedEvent, AlertDispatchedEvent, HostHeartbeatEvent.latencyMs,
      HostDisconnectedEvent.reason/timestamp, RuleTriggeredEvent.behavior/timestamp),
      makes NoteStore.save return the note ID, and introduces SQLiteAuditLog.
    repositories:
      workspace-types: "contract-0.3.0"
      workspace-core: "contract-0.3.0"
      workspace-host: "contract-0.3.0"
      workspace-voice: "contract-0.3.0"
      workspace-text: "contract-0.3.0"
  - version: "0.2.0"
    name: "COG ↔ SDL capability bridge contract"
    date: "2026-06-28"
    description: >
      Initial ratified bridge contract. Defines CogTaskFrame, CogContext,
      SdlCapabilityPlan, CapabilityBridgeClient, and supporting types.
      V0 scope is observe/advise only.
    repositories:
      workspace-types: "94220e0"
      workspace-core: "2bfe67b"
      capability-bridge: "bc6cbab"
      workspace-host: "18bc2bf"
      cocogiri-meta: "d707f94"
